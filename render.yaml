# render.yaml — Render Blueprint
# Deploys the VibeCode backend automatically.
# Docs: https://render.com/docs/blueprint-spec
#
# Usage: Connect your repo to Render and it will detect this file.

services:
  - type: web
    name: vibecode-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free          # upgrade to starter ($7/mo) for always-on
    region: oregon      # us-west-2 — closest to most US users
    branch: main
    autoDeploy: true    # redeploy on every push to main

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vibecode-db
          property: connectionString

      - key: GEMINI_API_KEY
        sync: false     # set manually in Render dashboard — never commit this

      - key: JWT_SECRET_KEY
        generateValue: true   # Render generates a secure random value

      - key: STRIPE_SECRET_KEY
        sync: false     # set manually in Render dashboard

      - key: STRIPE_WEBHOOK_SECRET
        sync: false     # from Stripe dashboard → Webhooks → your endpoint

      - key: STRIPE_PRO_PRICE_ID
        sync: false     # Stripe Price ID for Pro plan

      - key: STRIPE_TEAM_PRICE_ID
        sync: false     # Stripe Price ID for Team plan

      - key: ENVIRONMENT
        value: production

      - key: FRONTEND_URL
        sync: false     # set to your Vercel URL, e.g. https://vibecode.vercel.app

    healthCheckPath: /health
    startCommand: "bash /app/start.sh"

databases:
  - name: vibecode-db
    databaseName: vibecode
    plan: free          # 90-day free Postgres on Render
    region: oregon
